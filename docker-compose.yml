version: "3.8"

services:
  app:
    image: php:8.2-cli
    container_name: colecifebens-app
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
command: sh -c "if [ ! -f .env ]; then cp .env.example .env; fi && php artisan key:generate && php artisan serve --host=0.0.0.0 --port=8000"    # depends_on:
